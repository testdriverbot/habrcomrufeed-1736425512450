version: 4.1.35
steps:
  - prompt: Locate the language toggle option on the page.
    commands:
      - command: hover-text
        text: English
        description: language toggle option in the Google Translate popup
        action: click
  - prompt: Switch between available languages.
    commands:
      - command: hover-text
        text: Russian
        description: language toggle option in the Google Translate popup
        action: click
  - prompt: >-
      Assert that the page content updates according to the selected language. 
      # Use the content of the file from the environment
    commands:
      - command: assert
        expect: the page contains Russian text indicating the language change
